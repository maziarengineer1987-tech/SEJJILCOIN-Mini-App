<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SEJJIL COIN Mini App</title>

<style>

*{
box-sizing:border-box;
}

body{

margin:0;
height:100vh;
background-image:url("background.jpg.png");
background-size:cover;
background-position:center;
font-family:Arial, sans-serif;
color:white;
text-align:center;

}


.overlay{

min-height:100vh;
background:rgba(0,0,0,0.55);
padding-top:25px;

}


h1{

font-size:32px;
letter-spacing:2px;
text-shadow:0 0 15px gold;

}



.logo{

width:150px;
margin:15px auto;
display:block;

}



.balance{

font-size:26px;
font-weight:bold;
margin:20px;

}



.coin{

width:210px;
cursor:pointer;
transition:0.15s;
filter:drop-shadow(0 0 20px gold);

}



.coin:active{

transform:scale(0.85) rotate(5deg);

}



.fly{

position:absolute;
font-size:30px;
font-weight:bold;
animation:up 1s forwards;

}



@keyframes up{

0%{
opacity:1;
transform:translateY(0);
}

100%{

opacity:0;
transform:translateY(-100px);

}

}



.energy-box{
.token-area{
text-align:center;
}


.token-logo{

width:180px;
height:180px;

object-fit:cover;

border-radius:50%;

display:block;

margin:20px auto;

background:none;

}


.join-box{

text-align:center;

margin-top:30px;

}


.join-box a{

display:block;

background:#f5d900;

color:#111;

padding:18px;

margin:15px auto;

width:80%;

max-width:400px;

border-radius:30px;

font-weight:bold;

text-decoration:none;

font-size:18px;

}


.join-box a:hover{

opacity:.8;

}
width:85%;
height:22px;
background:#222;
margin:25px auto;
border-radius:20px;
overflow:hidden;

}



.energy{

height:100%;
width:100%;
background:gold;

}



.task{

width:90%;
margin:15px auto;
padding:15px;
background:rgba(255,255,255,0.12);
border-radius:20px;
border:1px solid rgba(255,255,255,0.2);

}



button{

width:90%;
padding:14px;
border:none;
border-radius:25px;
background:gold;
font-weight:bold;
font-size:16px;
cursor:pointer;

}



.footer{

margin-top:20px;
font-size:14px;
opacity:.8;

}



</style>

</head>


<body>


<div class="overlay">



<img src="token.png" style="width:150px;height:150px;border-radius:50%;object-fit:cover;background:transparent;">


<div class="balance">

SJL BALANCE:
<span id="coins">0</span>

</div>




<img class="coin" src="token.png" onclick="tap(event)">


<!-- SEJJIL LOGO -->
<div class="token-area">

<img src="token.png" class="token-logo">

<h2>SJL BALANCE: <span id="balance">0</span></h2>

</div>


<!-- ENERGY -->
<div class="energy">
⚡️ Energy 1000 / 1000
</div>


<!-- Telegram & X Join -->
<div class="join-box">

<h3>Join SEJJILCOIN Community</h3>

<a href="https://t.me/+PB-Qftc48jY1Njc0" target="_blank" onclick="addReward()">
🚀 Join Telegram +10,000 SJL
</a>


<a href="https://x.com/SEJJILCOIN" target="_blank" onclick="addReward()">
𝕏 Join X (Twitter) +10,000 SJL
</a>


</div>


<div class="energy-box">

<div class="energy"></div>

</div>


<p>⚡ Energy 1000 / 1000</p>




<div class="task">

<h3>Join Telegram Community</h3>

<button onclick="telegram()">

JOIN +10,000 SJL

</button>


</div>





<div class="task">

<h3>Follow SEJJIL on X</h3>

<button onclick="twitter()">

FOLLOW +10,000 SJL

</button>


</div>




<div class="footer">

SEJJIL COIN — Digital Movement For Peace & Community

</div>



</div>




<script>


let coins =
Number(localStorage.getItem("coins")) || 0;


document.getElementById("coins").innerHTML=coins;



function update(){

document.getElementById("coins").innerHTML=coins;

localStorage.setItem("coins",coins);

}





function tap(e){


coins++;

update();



let x=document.createElement("div");

x.className="fly";

x.innerHTML="+1 SJL";

x.style.left=e.clientX+"px";

x.style.top=e.clientY+"px";


document.body.appendChild(x);


setTimeout(()=>{

x.remove();

},1000);



}





function telegram(){


window.open(
"https://t.me/YOUR_TELEGRAM_LINK",
"_blank"
);


coins +=10000;

update();


}




function twitter(){


window.open(
"https://x.com/YOUR_X_LINK",
"_blank"
);


coins +=10000;

update();


}



</script>



</body>

</html>
